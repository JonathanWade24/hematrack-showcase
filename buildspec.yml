version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm ci

  build:
    commands:
      - echo Building application...
      - npm run build

  post_build:
    commands:
      - echo Build completed...

artifacts:
  files:
    - package.json
    - package-lock.json
    - next.config.ts
    - .next/**/*
    - node_modules/**/*
    - public/**/*
    - .platform/**/*
    - Procfile
  base-directory: '.' 